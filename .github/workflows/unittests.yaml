name: Unit Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install PSScriptAnalyzer
      shell: pwsh
      run: |
        if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck
        }

    - name: Run PSScriptAnalyzer
      shell: pwsh
      continue-on-error: true
      run: |
        $settings = if (Test-Path "lint/PSScriptAnalyser.ps1") {
          . ./lint/PSScriptAnalyser.ps1
        } else { @{} }
        $results = Invoke-ScriptAnalyzer -Path . -Settings $settings -Recurse -Exclude @("*.Tests.ps1", "hksutil.ps1")
        $results | Format-Table Severity, RuleName, ScriptName, Line, Message -AutoSize -Wrap
        if ($results) { Write-Host "## $($results.Count) issues found" }

  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Pester 3.4.0
      shell: pwsh
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        Install-Module -Name Pester -RequiredVersion 3.4.0 -Force -SkipPublisherCheck -AllowClobber

    - name: Run Pester tests
      shell: pwsh
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        Import-Module Pester -RequiredVersion 3.4.0 -Force
        Invoke-Pester -Path "tests/*.Tests.ps1"
      env:
        TEMP: ${{ runner.temp }}
