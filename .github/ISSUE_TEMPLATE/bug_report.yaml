name: "Bug report"
description: "Report a bug to help us identify and fix issues."
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please provide as much detail as possible.

  - type: checkboxes
    id: read_issues
    attributes:
      label: "I have checked for existing issues"
      description: "Make sure this bug hasn't already been reported."
      options:
        - label: Yes, I did
          required: true

  - type: dropdown
    id: affected_part
    attributes:
      label: What part of HksUtil are you having issues with?
      options:
        - Install Apps
        - System Tweaks
        - Features & Fixes
        - Preferences
        - Legacy Panels
        - Settings (DNS, Export, Terminal)
        - Other
    validations:
      required: true

  - type: textarea
    id: issue_description
    attributes:
      label: Describe the bug
      placeholder: "A clear and concise description of what the bug is."
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: "What did you expect to happen?"

  - type: textarea
    id: error_output
    attributes:
      label: Error output / Screenshot
      placeholder: "Paste error logs or attach a screenshot."

  - type: textarea
    id: system_info
    attributes:
      label: System information
      placeholder: "Windows version, PowerShell version, etc."
